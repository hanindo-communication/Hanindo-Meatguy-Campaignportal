<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landing pages — Campaign portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0d0b0a;
      --bg-card: #161412;
      --accent: #c9a962;
      --accent-dim: #a68b4a;
      --text: #f5f0eb;
      --text-muted: #9a9188;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem 1.25rem 3rem;
      background-image:
        radial-gradient(ellipse 85% 55% at 50% 12%, rgba(201, 169, 98, 0.05) 0%, transparent 45%),
        radial-gradient(ellipse 55% 45% at 90% 60%, rgba(201, 169, 98, 0.04) 0%, transparent 50%);
    }
    .top {
      max-width: 1200px;
      margin: 0 auto 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: clamp(1.5rem, 4vw, 2rem);
      letter-spacing: 0.02em;
    }
    .top a.logout {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 400;
    }
    .top a.logout:hover { color: var(--accent); }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }
    .load, .fail {
      text-align: center;
      color: var(--text-muted);
      padding: 2rem;
    }
    .fail { color: #c97a62; }
    section.month {
      margin-bottom: 2.5rem;
    }
    h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .card-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
    }
    @media (min-width: 640px) {
      .card-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (min-width: 1024px) {
      .card-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    .lp-card {
      background: var(--bg-card);
      border: 1px solid rgba(201, 169, 98, 0.12);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .lp-card:hover {
      border-color: rgba(201, 169, 98, 0.28);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }
    .preview-wrap {
      display: block;
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      background: #0a0908;
      text-decoration: none;
      color: inherit;
    }
    .preview-inner {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .preview-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 1280px;
      height: 800px;
      border: 0;
      pointer-events: none;
      transform: scale(0.3125);
      transform-origin: top left;
    }
    .preview-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(13, 11, 10, 0.55);
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .preview-wrap:hover .preview-overlay {
      opacity: 1;
    }
    .card-body {
      padding: 1rem 1.1rem 1.15rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
    }
    .card-body .name {
      font-weight: 500;
      font-size: 1.05rem;
      line-height: 1.3;
    }
    .card-body .path {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 300;
      word-break: break-all;
      flex: 1;
    }
    a.open {
      align-self: flex-start;
      margin-top: 0.25rem;
      padding: 0.55rem 1.15rem;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
      color: var(--bg-deep);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.03em;
    }
    a.open:hover { filter: brightness(1.06); }
  </style>
</head>
<body>
  <header class="top">
    <h1>Landing pages</h1>
    <a class="logout" href="/logout">Keluar</a>
  </header>
  <div class="wrap" id="root">
    <p class="load" id="load">Memuat daftar…</p>
    <p class="fail" id="fail" hidden>Gagal memuat daftar. Muat ulang halaman.</p>
    <div id="content" hidden></div>
  </div>
  <script>
    (function () {
      var loadEl = document.getElementById('load');
      var failEl = document.getElementById('fail');
      var contentEl = document.getElementById('content');

      fetch('/api/landing-pages', { credentials: 'same-origin', redirect: 'manual' })
        .then(function (r) {
          if (r.type === 'opaqueredirect') {
            window.location.href = '/?next=' + encodeURIComponent(window.location.pathname || '/');
            return null;
          }
          if (!r.ok) throw new Error('bad status');
          return r.json();
        })
        .then(function (data) {
          if (!data) return;
          loadEl.hidden = true;
          contentEl.hidden = false;
          var groups = data.groups || [];
          if (groups.length === 0) {
            contentEl.innerHTML = '<p class="load">Belum ada landing page. Tambahkan folder <code style="color:var(--accent)">public/[yyyymm]/[nama-slug]/</code> dengan <code>index.html</code>.</p>';
            return;
          }
          var frag = document.createDocumentFragment();
          groups.forEach(function (g) {
            var sec = document.createElement('section');
            sec.className = 'month';
            var h2 = document.createElement('h2');
            h2.textContent = g.label + ' · ' + g.yyyymm;
            sec.appendChild(h2);
            var grid = document.createElement('div');
            grid.className = 'card-grid';
            (g.pages || []).forEach(function (p) {
              var card = document.createElement('article');
              card.className = 'lp-card';

              var prevA = document.createElement('a');
              prevA.className = 'preview-wrap';
              prevA.href = p.path;
              prevA.setAttribute('aria-label', 'Buka pratinjau: ' + p.displayName);
              var inner = document.createElement('div');
              inner.className = 'preview-inner';
              var iframe = document.createElement('iframe');
              iframe.className = 'preview-frame';
              iframe.src = p.path;
              iframe.setAttribute('title', 'Pratinjau: ' + p.displayName);
              iframe.loading = 'lazy';
              inner.appendChild(iframe);
              var overlay = document.createElement('span');
              overlay.className = 'preview-overlay';
              overlay.textContent = 'Buka halaman';
              prevA.appendChild(inner);
              prevA.appendChild(overlay);

              var body = document.createElement('div');
              body.className = 'card-body';
              var name = document.createElement('div');
              name.className = 'name';
              name.textContent = p.displayName;
              var pathEl = document.createElement('div');
              pathEl.className = 'path';
              pathEl.textContent = p.path;
              var open = document.createElement('a');
              open.className = 'open';
              open.href = p.path;
              open.textContent = 'Buka';
              body.appendChild(name);
              body.appendChild(pathEl);
              body.appendChild(open);

              card.appendChild(prevA);
              card.appendChild(body);
              grid.appendChild(card);
            });
            sec.appendChild(grid);
            frag.appendChild(sec);
          });
          contentEl.appendChild(frag);
        })
        .catch(function () {
          loadEl.hidden = true;
          failEl.hidden = false;
        });
    })();
  </script>
</body>
</html>
